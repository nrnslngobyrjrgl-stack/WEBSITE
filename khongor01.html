<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌍 World Explorer | Premium Edition</title>

  <style>
    :root {
      --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      --card-bg: rgba(255, 255, 255, 0.15);
      --card-border: rgba(255, 255, 255, 0.25);
      --text-color: #ffffff;
      --accent-color: #00f2fe;
      --glass-blur: blur(15px);
      --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .dark {
      --bg-gradient: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
      --card-bg: rgba(0, 0, 0, 0.4);
      --card-border: rgba(255, 255, 255, 0.1);
      --accent-color: #bb86fc;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, sans-serif;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: var(--text-color);
      transition: background 0.5s ease;
      overflow-x: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 🎨 Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    ::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }

    /* 🎈 Floating Bubbles */
    .bg-bubbles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    .bg-bubbles li { position: absolute; list-style: none; background: rgba(255,255,255,0.1); bottom: -160px; animation: bubble 25s linear infinite; border-radius: 50%; }
    .bg-bubbles li:nth-child(1) { left: 10%; width: 80px; height: 80px; }
    .bg-bubbles li:nth-child(2) { left: 20%; width: 40px; height: 40px; animation-delay: 2s; }
    .bg-bubbles li:nth-child(3) { left: 70%; width: 120px; height: 120px; animation-delay: 4s; }
    .bg-bubbles li:nth-child(4) { left: 85%; width: 60px; height: 60px; animation-delay: 1s; }
    
    @keyframes bubble {
      0% { transform: translateY(0) rotate(0); opacity: 0.8; }
      100% { transform: translateY(-1200px) rotate(720deg); opacity: 0; }
    }

    h1 {
      text-align: center;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 20px;
      text-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .theme-btn {
      display: block;
      margin: 0 auto 30px;
      padding: 12px 30px;
      border-radius: 30px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      backdrop-filter: var(--glass-blur);
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: var(--transition);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .theme-btn:hover {
      transform: translateY(-3px) scale(1.05);
      background: var(--accent-color);
      color: #000;
    }

    #searchBox {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 50px;
    }

    input {
      padding: 15px 25px;
      border-radius: 30px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      backdrop-filter: var(--glass-blur);
      color: white;
      width: 280px;
      outline: none;
      transition: var(--transition);
    }

    input:focus { width: 350px; box-shadow: 0 0 25px var(--accent-color); }

    .search-btn {
      padding: 10px 35px;
      border-radius: 30px;
      border: none;
      background: var(--accent-color);
      color: #000;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }

    .search-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--accent-color); }

    /* 🌍 Grid & Card */
    .country-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .country-btn {
      background: var(--card-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--card-border);
      padding: 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: var(--transition);
      color: white;
      text-align: center;
    }

    .country-btn:hover { transform: translateY(-12px); border-color: var(--accent-color); }

    .country-btn img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      border-radius: 15px;
      margin-bottom: 15px;
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    }

    /* 📦 Detail Section */
    .detail-container {
      max-width: 600px;
      margin: 0 auto;
      animation: cardPop 0.6s ease;
    }

    .back-btn {
      padding: 12px 25px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      margin-bottom: 20px;
      transition: var(--transition);
      font-weight: bold;
    }

    .back-btn:hover { background: #fff; color: #000; transform: translateX(-5px); }

    .card {
      background: var(--card-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--card-border);
      padding: 40px;
      border-radius: 35px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .card img {
      width: 280px;
      border-radius: 20px;
      margin-bottom: 30px;
      border: 4px solid rgba(255,255,255,0.2);
    }

    .card h2 { font-size: 2.2rem; color: var(--accent-color); margin: 0 0 20px; }
    .card p { font-size: 1.1rem; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin: 0; }

    .map-link {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 35px;
      background: #ff4b2b;
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      transition: var(--transition);
    }

    .map-link:hover { transform: scale(1.1); box-shadow: 0 0 25px #ff4b2b; }

    @keyframes cardPop {
      from { opacity: 0; transform: scale(0.8) translateY(30px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .loader {
      border: 5px solid rgba(255,255,255,0.1);
      border-top: 5px solid var(--accent-color);
      border-radius: 50%; width: 50px; height: 50px;
      animation: spin 1s linear infinite;
      margin: 40px auto; display: none;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<ul class="bg-bubbles">
  <li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
</ul>

<h1>🌏 World Explorer</h1>

<button class="theme-btn" onclick="toggleMode()">✨ Өнгө Солих</button>

<div id="searchBox">
  <input type="text" id="searchInput" placeholder="Улсын нэр (English)..." onkeypress="if(event.key==='Enter') searchCountry()">
  <button class="search-btn" onclick="searchCountry()">Хайх</button>
</div>

<div id="loader" class="loader"></div>
<div id="result"></div>
<div class="country-grid" id="countryList"></div>

<script>
  const loader = document.getElementById("loader");

  function toggleMode() {
    document.body.classList.toggle("dark");
  }

  function showLoader(s) {
    loader.style.display = s ? "block" : "none";
  }

  async function searchCountry() {
    const value = document.getElementById("searchInput").value.trim();
    if (!value) return;
    showLoader(true);
    try {
      const res = await fetch(`https://restcountries.com/v3.1/name/${value}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      renderGrid(data);
      document.getElementById("result").innerHTML = "";
    } catch {
      alert("Улс олдсонгүй! Та зөв бичсэн эсэхээ шалгаарай.");
    } finally { showLoader(false); }
  }

  function renderGrid(data) {
    const container = document.getElementById("countryList");
    container.innerHTML = "";
    container.style.display = "grid";
    document.getElementById("searchBox").style.display = "flex";

    data.forEach((c, i) => {
      const btn = document.createElement("button");
      btn.className = "country-btn";
      btn.style.animation = `cardPop 0.5s ease forwards ${i * 0.05}s`;
      btn.innerHTML = `<img src="${c.flags.png}"><p><b>${c.name.common}</b></p>`;
      btn.onclick = () => { showDetail(c.name.common); window.scrollTo({top:0, behavior:'smooth'}); };
      container.appendChild(btn);
    });
  }

  async function showDetail(name) {
    showLoader(true);
    document.getElementById("countryList").style.display = "none";
    document.getElementById("searchBox").style.display = "none";

    try {
      const res = await fetch(`https://restcountries.com/v3.1/name/${name}?fullText=true`);
      const data = await res.json();
      const info = data[0];

      document.getElementById("result").innerHTML = `
        <div class="detail-container">
          <button class="back-btn" onclick="goBack()">⬅️ Буцах</button>
          <div class="card">
            <h2>${info.name.common}</h2>
            <img src="${info.flags.svg || info.flags.png}">
            <p>🏙️ <b>Нийслэл:</b> ${info.capital ? info.capital[0] : "Байхгүй"}</p>
            <p>👥 <b>Хүн ам:</b> ${info.population.toLocaleString()}</p>
            <p>🗺️ <b>Газар нутаг:</b> ${info.area.toLocaleString()} км²</p>
            <p>🌍 <b>Тив:</b> ${info.continents[0]}</p>
            <p>💰 <b>Валют:</b> ${Object.values(info.currencies || {}).map(v => `${v.name} (${v.symbol})`).join(", ")}</p>
            <a href="${info.maps.googleMaps}" target="_blank" class="map-link">📍 Google Maps дээр харах</a>
          </div>
        </div>`;
    } catch {
      alert("Алдаа гарлаа!");
      goBack();
    } finally { showLoader(false); }
  }

  function goBack() {
    document.getElementById("result").innerHTML = "";
    document.getElementById("countryList").style.display = "grid";
    document.getElementById("searchBox").style.display = "flex";
  }

  // Эхлэлд харагдах улсууд
  const defaultList = ["Mongolia", "Japan", "Switzerland", "Canada", "Norway", "South Korea", "Italy", "France"];
  async function loadInitial() {
    showLoader(true);
    try {
      const promises = defaultList.map(n => fetch(`https://restcountries.com/v3.1/name/${n}`).then(r => r.json()));
      const res = await Promise.all(promises);
      renderGrid(res.map(d => d[0]));
    } finally { showLoader(false); }
  }

  loadInitial();
</script>

</body>
</html>
