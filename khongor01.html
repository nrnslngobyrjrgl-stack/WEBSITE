<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дэлхийн Улс Орнууд</title>

  <style>
    :root {
      --bg-color: #f0f2f5;
      --card-bg: #ffffff;
      --text-color: #333;
      --accent-color: #4a90e2;
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .dark {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-color: #e0e0e0;
      --accent-color: #bb86fc;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: var(--transition);
    }

    h1 {
      text-align: center;
      font-weight: 300;
      letter-spacing: 2px;
    }

    /* 🌗 Toggle Button */
    .theme-btn {
      display: block;
      margin: 10px auto;
      padding: 10px 20px;
      border-radius: 25px;
      border: none;
      background: var(--accent-color);
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: var(--transition);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .theme-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    /* 🔍 Search Box */
    #searchBox {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 30px 0;
    }

    input {
      padding: 12px 20px;
      border-radius: 25px;
      border: 1px solid #ddd;
      width: 250px;
      outline: none;
      transition: var(--transition);
    }

    input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 8px var(--accent-color);
    }

    .search-btn {
      padding: 10px 20px;
      border-radius: 25px;
      border: none;
      background: var(--text-color);
      color: var(--bg-color);
      cursor: pointer;
    }

    /* 🌍 Country grid */
    .country-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: 20px auto;
    }

    .country-btn {
      background: var(--card-bg);
      border: none;
      padding: 15px;
      border-radius: 15px;
      cursor: pointer;
      text-align: center;
      transition: var(--transition);
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      animation: fadeIn 0.6s ease-out forwards;
      opacity: 0;
      color: var(--text-color);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .country-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    .country-btn img {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    /* 📦 Detail card */
    .card {
      margin: 30px auto;
      padding: 30px;
      max-width: 450px;
      background: var(--card-bg);
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes cardPop {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .card img {
      width: 200px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      margin: 15px 0;
    }

    .card h2 { margin-top: 0; color: var(--accent-color); }
    .card p { margin: 8px 0; font-size: 0.95rem; }

    /* Loading Spinner */
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--accent-color);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      display: none;
      margin: 20px auto;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  </style>
</head>
<body class="light">

<h1>🌍 Дэлхийн Улс Орнууд</h1>

<button class="theme-btn" onclick="toggleMode()">🌗 Өнгө солих</button>

<div id="searchBox">
  <input type="text" id="searchInput" placeholder="Улсын нэр (English)..." onkeypress="if(event.key==='Enter') searchCountry()">
  <button class="search-btn" onclick="searchCountry()">Хайх</button>
</div>

<div id="loader" class="loader"></div>
<div id="result"></div>
<div class="country-grid" id="countryList"></div>

<script>
  const loader = document.getElementById("loader");

  // 🌗 Dark / Light Mode Toggle
  function toggleMode() {
    const body = document.body;
    if (body.classList.contains("light")) {
      body.classList.replace("light", "dark");
    } else {
      body.classList.replace("dark", "light");
    }
  }

  // 🔍 Search Country
  async function searchCountry() {
    const value = document.getElementById("searchInput").value.trim();
    if (!value) return;

    showLoader(true);
    try {
      const res = await fetch(`https://restcountries.com/v3.1/name/${value}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      
      renderGrid(data);
      document.getElementById("result").innerHTML = ""; // Хайлт хийхэд дэлгэрэнгүйг цэвэрлэнэ
    } catch {
      alert("Улс олдсонгүй! Та англиар зөв бичсэн эсэхээ шалгана уу.");
    } finally {
      showLoader(false);
    }
  }

  // 🔹 Render Grid Items
  function renderGrid(data) {
    const container = document.getElementById("countryList");
    container.innerHTML = "";
    
    data.forEach((c, index) => {
      const btn = document.createElement("button");
      btn.className = "country-btn";
      btn.style.animationDelay = `${index * 0.05}s`; // Улсууд дараалж орж ирэх эффект

      btn.innerHTML = `
        <img src="${c.flags.png}" alt="flag">
        <p><b>${c.name.common}</b></p>
      `;

      btn.onclick = () => {
        showDetail(c.name.common);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      container.appendChild(btn);
    });
  }

  // 📦 Show Detail Card
  async function showDetail(name) {
    showLoader(true);
    try {
      const res = await fetch(`https://restcountries.com/v3.1/name/${name}?fullText=true`);
      const data = await res.json();
      const info = data[0];

      document.getElementById("result").innerHTML = `
        <div class="card">
          <h2>${info.name.common}</h2>
          <img src="${info.flags.svg || info.flags.png}">
          <p><b>Нийслэл:</b> ${info.capital ? info.capital[0] : "Байхгүй"}</p>
          <p><b>Хүн ам:</b> ${info.population.toLocaleString()} хүн</p>
          <p><b>Нутаг дэвсгэр:</b> ${info.area.toLocaleString()} км²</p>
          <p><b>Тив:</b> ${info.continents.join(", ")}</p>
          <p><b>Валют:</b> ${Object.values(info.currencies || {}).map(c => `${c.name} (${c.symbol})`).join(", ")}</p>
        </div>
      `;
    } catch {
      document.getElementById("result").innerHTML = "<p>Мэдээлэл авахад алдаа гарлаа.</p>";
    } finally {
      showLoader(false);
    }
  }

  // 🔄 Initial Load
  const defaultCountries = ["Mongolia", "Japan", "USA", "France", "Germany", "Norway", "South Korea", "Italy"];

  async function loadInitial() {
    showLoader(true);
    const promises = defaultCountries.map(name => 
      fetch(`https://restcountries.com/v3.1/name/${name}`).then(res => res.json())
    );
    
    try {
      const results = await Promise.all(promises);
      const combinedData = results.map(data => data[0]);
      renderGrid(combinedData);
    } catch (e) {
      console.error("Ачааллахад алдаа гарлаа");
    } finally {
      showLoader(false);
    }
  }

  function showLoader(show) {
    loader.style.display = show ? "block" : "none";
  }

  loadInitial();
</script>

</body>
</html>
